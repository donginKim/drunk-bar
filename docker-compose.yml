services:
  drunk-bar:
    build: .
    ports:
      - "${PORT:-8888}:8888"
    env_file:
      - .env
    volumes:
      - ./history:/app/history
      - ./static/photos:/app/static/photos
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8888/bar/status').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3

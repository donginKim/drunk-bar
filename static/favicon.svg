<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- background circle -->
  <circle cx="32" cy="32" r="30" fill="#2d1500" stroke="#ffaa33" stroke-width="2"/>

  <!-- beer mug body -->
  <rect x="18" y="20" width="24" height="30" rx="3" fill="#ffaa33" stroke="#1a0a00" stroke-width="2"/>

  <!-- beer foam (top) -->
  <ellipse cx="24" cy="20" rx="5" ry="3.5" fill="#fff8e7" stroke="#1a0a00" stroke-width="1.5"/>
  <ellipse cx="32" cy="19" rx="5.5" ry="4" fill="#fff8e7" stroke="#1a0a00" stroke-width="1.5"/>
  <ellipse cx="39" cy="20" rx="4.5" ry="3.5" fill="#fff8e7" stroke="#1a0a00" stroke-width="1.5"/>

  <!-- handle -->
  <path d="M 42 26 Q 52 26 52 35 Q 52 44 42 44" fill="none" stroke="#1a0a00" stroke-width="3" stroke-linecap="round"/>

  <!-- cute face on mug -->
  <circle cx="25" cy="33" r="1.8" fill="#1a0a00"/>
  <circle cx="35" cy="33" r="1.8" fill="#1a0a00"/>
  <!-- blush -->
  <circle cx="23" cy="38" r="2" fill="#ff6688" opacity="0.6"/>
  <circle cx="37" cy="38" r="2" fill="#ff6688" opacity="0.6"/>
  <!-- smile -->
  <path d="M 27 40 Q 30 44 33 40" fill="none" stroke="#1a0a00" stroke-width="1.8" stroke-linecap="round"/>

  <!-- bubbles -->
  <circle cx="22" cy="28" r="1" fill="#fff8e7" opacity="0.7"/>
  <circle cx="38" cy="26" r="1.2" fill="#fff8e7" opacity="0.7"/>
</svg>

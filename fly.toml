# fly.toml app configuration file generated for drunk-street on 2026-04-17T09:28:59+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'drunk-street'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

[env]
  CORS_ORIGINS = '*'
  PORT = '8888'

[http_service]
  internal_port = 8888
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 500
    soft_limit = 200

[mounts]
  source = 'drunk_data'
  destination = '/data'

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
